name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'config/constitutions/madison-5k.md'
      - 'paper/drafts/v0.2-draft.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Copy constitution into docs
        run: |
          # Wrap constitution in div for custom styling
          echo '<div class="constitution-content" markdown>' > docs/constitution.md
          echo '' >> docs/constitution.md
          cat config/constitutions/madison-5k.md >> docs/constitution.md
          echo '' >> docs/constitution.md
          echo '</div>' >> docs/constitution.md

      - name: Copy paper into docs with Distill wrapper
        run: |
          echo '<div class="paper-content" markdown>' > docs/paper.md
          echo '' >> docs/paper.md
          cat paper/drafts/v0.2-draft.md >> docs/paper.md
          echo '' >> docs/paper.md
          echo '</div>' >> docs/paper.md

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
