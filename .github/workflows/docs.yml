name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'config/constitutions/madison-5k.md'
      - 'paper/drafts/v0.2-draft.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Prepare constitution with sidenotes
        run: |
          python3 << 'PYEOF'
          import re

          with open("config/constitutions/madison-5k.md") as f:
              text = f.read()

          # Convert inline citations like *(Cheney, p.45)* to sidenote spans
          # Pattern: text in italics that looks like a citation (Author, p.XX) or (Author)
          def to_sidenote(m):
              cite = m.group(1)
              return f'\n<span class="sidenote">{cite}</span>\n'

          # Match *(...citation text...)* patterns that contain author names
          text = re.sub(
              r'\*\(([^)]*(?:Cheney|Ketcham|Feldman|Ellis|Leibiger|Burstein|Isenberg|Madison|Hunt|Rakove|McCoy|Banning)[^)]*)\)\*',
              to_sidenote,
              text
          )

          # Also match *(Source: ...)* patterns
          text = re.sub(
              r'\*\((Source:[^)]*)\)\*',
              to_sidenote,
              text
          )

          # Wrap in constitution styling div
          output = '<div class="constitution-content" markdown>\n\n'
          output += text
          output += '\n\n</div>\n'

          with open("docs/constitution.md", "w") as f:
              f.write(output)

          print(f"Constitution processed: {len(text)} chars")
          PYEOF

      - name: Prepare paper with Distill wrapper and hyperlinked references
        run: |
          python3 << 'PYEOF'
          import re

          with open("paper/drafts/v0.2-draft.md") as f:
              text = f.read()

          # Define reference mapping: author key -> (number, anchor id)
          refs = [
              (1, "askell",  ["Askell"]),
              (2, "hong",    ["Hong et al"]),
              (3, "lambert-pipeline", ["Lambert.*Opening", "Lambert.*Pipeline"]),
              (4, "lambert-book",     ["Lambert.*RLHF Book", "Lambert.*Chapters"]),
              (5, "maiya",   ["Maiya"]),
              (6, "pan",     ["Pan"]),
              (7, "shao",    ["Shao"]),
              (8, "wang",    ["Wang"]),
          ]

          # Build lookup: first author surname -> ref number and anchor
          author_to_ref = {
              "Askell":  (1, "askell"),
              "Hong":    (2, "hong"),
              "Maiya":   (5, "maiya"),
              "Pan":     (6, "pan"),
              "Shao":    (7, "shao"),
              "Wang":    (8, "wang"),
          }

          # Convert parenthetical citations: (Author et al. YYYY) or (Author et al., YYYY) or (Author YYYY)
          def replace_paren_cite(m):
              full = m.group(0)
              for author, (num, anchor) in author_to_ref.items():
                  if author in full:
                      return f'<a href="#ref-{anchor}" class="cite-link"><sup>[{num}]</sup></a>'
              return full

          text = re.sub(
              r'\((?:' + '|'.join(author_to_ref.keys()) + r')[^)]*?\d{4}[^)]*?\)',
              replace_paren_cite,
              text
          )

          # Convert inline mentions: "Author et al. (YYYY)" or "Author (YYYY)"
          def replace_inline_cite(m):
              name_part = m.group(1)
              year_part = m.group(2)
              for author, (num, anchor) in author_to_ref.items():
                  if author in name_part:
                      return f'{name_part} ({year_part})<a href="#ref-{anchor}" class="cite-link"><sup>[{num}]</sup></a>'
              return m.group(0)

          text = re.sub(
              r'(' + '|'.join(author_to_ref.keys()) + r'(?:\s+et\s+al\.)?(?:,\s+\w+,?\s*(?:and|&)\s+\w+)?)\s*\((\d{4})\)',
              replace_inline_cite,
              text
          )

          # Also catch "Lambert's" possessive references with a link
          for author, (num, anchor) in author_to_ref.items():
              text = re.sub(
                  rf"({author})'s(?!\s*\()",
                  rf'\1\'s<a href="#ref-{anchor}" class="cite-link"><sup>[{num}]</sup></a>',
                  text,
                  count=0
              )

          # Add anchors to reference list entries
          ref_anchors = [
              ("Askell, A.,",  "askell", 1),
              ("Hong, J.,",    "hong", 2),
              ("Lambert, N. (2025). \"Opening", "lambert-pipeline", 3),
              ("Lambert, N. (2025). *The RLHF", "lambert-book", 4),
              ("Maiya, A.,",   "maiya", 5),
              ("Pan, A.,",     "pan", 6),
              ("Shao, Y.,",    "shao", 7),
              ("Wang, Y.,",    "wang", 8),
          ]

          for marker, anchor, num in ref_anchors:
              text = text.replace(
                  f"- {marker}",
                  f'- <span id="ref-{anchor}">**[{num}]**</span> {marker}'
              )

          # Wrap in paper styling div
          output = '<div class="paper-content" markdown>\n\n'
          output += text
          output += '\n\n</div>\n'

          with open("docs/paper.md", "w") as f:
              f.write(output)

          print(f"Paper processed: {len(text)} chars")
          PYEOF

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
