name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'config/constitutions/madison-5k.md'
      - 'paper/drafts/v0.2-draft.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Prepare constitution with sidenotes
        run: |
          python3 << 'PYEOF'
          import re

          with open("config/constitutions/madison-5k.md") as f:
              text = f.read()

          # Convert inline citations like *(Cheney, p.45)* to sidenote spans
          # Pattern: text in italics that looks like a citation (Author, p.XX) or (Author)
          def to_sidenote(m):
              cite = m.group(1)
              return f'\n<span class="sidenote">{cite}</span>\n'

          # Match *(...citation text...)* patterns that contain author names
          text = re.sub(
              r'\*\(([^)]*(?:Cheney|Ketcham|Feldman|Ellis|Leibiger|Burstein|Isenberg|Madison|Hunt|Rakove|McCoy|Banning)[^)]*)\)\*',
              to_sidenote,
              text
          )

          # Also match *(Source: ...)* patterns
          text = re.sub(
              r'\*\((Source:[^)]*)\)\*',
              to_sidenote,
              text
          )

          # Output as plain markdown — no div wrapper
          # Per-page styling handled by body.page-constitution CSS class
          with open("docs/constitution.md", "w") as f:
              f.write(text)

          print(f"Constitution processed: {len(text)} chars")
          PYEOF

      - name: Prepare paper with Distill wrapper and hyperlinked references
        run: python3 scripts/util/linkify_references.py --output docs/paper.md

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
